<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lanz &amp; Precht Daily Briefing Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script defer src="{{ url_for('static', filename='app.js') }}"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="studio-panel" aria-label="Debate starter">
        <img
          class="studio-image"
          src="https://images.unsplash.com/photo-1478737270239-2f02b77fc618?auto=format&fit=crop&w=1400&q=80"
          alt="Studio microphone"
        >
        <div class="studio-overlay"></div>
        <div class="studio-copy">
          <p class="eyebrow">Daily Briefing</p>
          <h1>Ein Thema. Zwei Stimmen. Direkt auf Sendung.</h1>
          <form id="debate-form" class="control-bar">
            <label class="topic-field">
              <span>Thema</span>
              <input
                id="topic"
                name="topic"
                type="text"
                required
                maxlength="180"
                value="Soll Deutschland ein Tempolimit einfuehren?"
              >
            </label>
            <label>
              <span>Turns</span>
              <select id="turns" name="turns">
                <option value="2">2</option>
                <option value="4">4</option>
                <option value="6" selected>6</option>
                <option value="8">8</option>
              </select>
            </label>
            <button id="start-button" type="submit">Live starten</button>
          </form>
        </div>
      </section>

      <section class="live-stage" aria-label="Live debate">
        <div class="status-row">
          <div class="status-copy">
            <span id="live-dot" class="live-dot" aria-hidden="true"></span>
            <span id="status-text">Bereit.</span>
          </div>
          <span id="conversation-id" class="conversation-id"></span>
        </div>

        <audio id="turn-player" class="turn-player" controls preload="auto"></audio>

        <ol id="turn-list" class="turn-list" aria-live="polite"></ol>
      </section>
    </main>
  </body>
</html>
